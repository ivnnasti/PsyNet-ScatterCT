<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhysScatterNet</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="header">
    <span class="header__title">PhysScatterNet</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Переключить тему">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <main class="main">
    <section class="section">
      <h2 class="section__title">Метрики модели</h2>
      <div class="metrics-grid">
        <div class="card">
          <div class="card__label">RMSE</div>
          <div class="card__value" id="rmseVal">—</div>
        </div>
        <div class="card">
          <div class="card__label">SSIM</div>
          <div class="card__value" id="ssimVal">—</div>
        </div>
      </div>
    </section>

    <section class="section" id="plotSection" style="display:none">
      <h2 class="section__title">Кривые обучения</h2>
      <img src="/plot" alt="Кривые обучения" class="plot-img" id="plotImg">
    </section>

    <section class="section">
      <h2 class="section__title">Инференс</h2>
      <div class="infer-form">
        <label class="file-label">
          <input type="file" id="fileInput" accept=".nii,.nii.gz" class="file-input">
          <span class="file-btn">Загрузить файл .nii.gz</span>
          <span class="file-name" id="fileName">Файл не выбран</span>
        </label>
        <button class="btn" id="runBtn">Запустить</button>
      </div>
      <div class="spinner" id="spinner" style="display:none"></div>
      <p class="error-msg" id="errorMsg" style="display:none"></p>
      <div class="result-grid" id="resultGrid" style="display:none">
        <div class="result-item">
          <div class="result-label">КБКТ (вход)</div>
          <img id="cbctImg" class="result-img" alt="КБКТ вход">
        </div>
        <div class="result-item">
          <div class="result-label">Результат коррекции</div>
          <img id="predImg" class="result-img" alt="Результат коррекции">
        </div>
      </div>
    </section>
  </main>

  <script src="/static/js/app.js"></script>
</body>
</html>
